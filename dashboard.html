<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Tenant Dashboard</h1>

  <p id="plan">Plan: loading...</p>
  <p id="usage">Usage: loading...</p>
  <p id="trialStatus">Trial status: loading...</p>
  <p id="tenantDetails">Tenant details: loading...</p>
  <h2>Document Log</h2>
  <p><button id="submitDocBtn">Submit Test Invoice</button></p>
  <p id="submitResult"></p>
  <ul id="documentsList">
  <li>Loading documents...</li>
  </ul>

  <p><a href="index.html">Back to Home</a></p>

  <script src="assets/js/api.js"></script>
<script>
  async function loadDashboard() {
    const tenantId = localStorage.getItem("tenantId") || "123";

    const planRes = await getPlan(tenantId);
    const usageRes = await getUsage(tenantId);
    const tenantRes = await getTenant(tenantId);
    const documentsRes = await getDocuments(tenantId);

    document.getElementById("plan").textContent =
      `Tenant: ${tenantId} | Plan: ${planRes.data.plan} | Monthly limit: ${planRes.data.monthlyPlanLimit} | Price: NGN ${planRes.data.monthlyPlanPriceNgn}`;

    document.getElementById("usage").textContent =
      `Usage: ${usageRes.data.used} used | ${usageRes.data.remaining} remaining out of ${usageRes.data.trialFreeSubmissions}`;
    if (usageRes.data.remaining <= 0) {
  document.getElementById("trialStatus").textContent =
    "Trial status: Expired - please upgrade your plan.";
} else {
  document.getElementById("trialStatus").textContent =
    `Trial status: Active - ${usageRes.data.remaining} free submission(s) remaining.`;
}

    if (tenantRes.success) {
      document.getElementById("tenantDetails").textContent =
        `Business: ${tenantRes.data.business_name} | TIN: ${tenantRes.data.tin} | Email: ${tenantRes.data.registered_email}`;
    } else {
      document.getElementById("tenantDetails").textContent = "Tenant details not found";
    }
    const documentsList = document.getElementById("documentsList");

if (documentsRes.success && documentsRes.data.length > 0) {
  documentsList.innerHTML = documentsRes.data.map(doc =>
    `<li>${doc.documentNumber} | ${doc.documentType} | ${doc.transmissionStatus} | ${doc.paymentStatus}</li>`
  ).join("");
} else {
  documentsList.innerHTML = "<li>No documents yet.</li>";
}
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadDashboard();

    document.getElementById("submitDocBtn").addEventListener("click", async function () {
      const tenantId = localStorage.getItem("tenantId") || "123";

      try {
  const res = await submitDocument({
    tenantId,
    documentType: "invoice",
    documentNumber: "INV-" + Date.now()
  });

  if (!res.success) {
    document.getElementById("submitResult").textContent =
      res.message || "Request failed";
    return;
  }

  document.getElementById("submitResult").textContent =
    `${res.message} | Doc ID: ${res.data.id} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}`;

  await loadDashboard();
} catch (err) {
  document.getElementById("submitResult").textContent =
    "Error submitting document";
}
    });
  });
</script>
</body>
</html>
