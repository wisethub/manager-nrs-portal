<script src="assets/js/api.js"></script>
<script>
  const planEl = document.getElementById("plan");
  const usageEl = document.getElementById("usage");
  const trialStatusEl = document.getElementById("trialStatus");
  const upgradeMessageEl = document.getElementById("upgradeMessage");
  const subscriptionActionEl = document.getElementById("subscriptionAction");
  const enterpriseMessageEl = document.getElementById("enterpriseMessage");
  const tenantBusinessEl = document.getElementById("tenantBusiness");
  const tenantTinEl = document.getElementById("tenantTin");
  const tenantEmailEl = document.getElementById("tenantEmail");
  const documentCountEl = document.getElementById("documentCount");
  const paidCountEl = document.getElementById("paidCount");
  const pendingCountEl = document.getElementById("pendingCount");
  const statusFilterEl = document.getElementById("statusFilter");
  const typeFilterEl = document.getElementById("typeFilter");
  const resetFiltersBtnEl = document.getElementById("resetFiltersBtn");
  const submitDocBtnEl = document.getElementById("submitDocBtn");
  const submitCreditNoteBtnEl = document.getElementById("submitCreditNoteBtn");
  const submitResultEl = document.getElementById("submitResult");
  const paymentResultEl = document.getElementById("paymentResult");
  const documentsListEl = document.getElementById("documentsList");
  const clearTenantBtnEl = document.getElementById("clearTenantBtn");

  async function fetchWithTimeout(promiseFactory, timeoutMs = 60000) {
    return Promise.race([
      promiseFactory(),
      new Promise((_, reject) =>
        setTimeout(() => reject(new Error("Request timed out")), timeoutMs)
      )
    ]);
  }

  async function wakeBackend() {
    try {
      await fetchWithTimeout(() => fetch(`${API_BASE_URL}/health`), 20000);
    } catch (err) {
      // ignore here; real errors will show below
    }
  }

  function renderDocuments(documents, remaining) {
    const paidTotal = documents.filter(doc => doc.paymentStatus === "PAID").length;
    const pendingTotal = documents.filter(doc => doc.paymentStatus !== "PAID").length;

    documentCountEl.textContent = `Total documents: ${documents.length}`;
    paidCountEl.textContent = `Paid documents: ${paidTotal}`;
    pendingCountEl.textContent = `Pending documents: ${pendingTotal}`;

    const selectedStatus = statusFilterEl.value;
    const selectedType = typeFilterEl.value;

    let filteredDocuments = selectedStatus === "ALL"
      ? documents
      : documents.filter(doc => doc.paymentStatus === selectedStatus);

    filteredDocuments = selectedType === "ALL"
      ? filteredDocuments
      : filteredDocuments.filter(doc => doc.documentType === selectedType);

    if (filteredDocuments.length === 0) {
      documentsListEl.innerHTML = "<li>No documents match the current filters.</li>";
      return;
    }

    documentsListEl.innerHTML = filteredDocuments.map(doc =>
      `<li>
        ID: ${doc.id} | Number: ${doc.documentNumber} | Type: ${doc.documentType} |
        Transmission: ${doc.transmissionStatus} | Payment: ${doc.paymentStatus}
        ${doc.irn ? ` | IRN: ${doc.irn}` : ""}
        ${doc.paymentStatus !== "PAID"
          ? `<button onclick="markPaid('${doc.id}')">Mark as Paid</button>`
          : ""}
      </li>`
    ).join("");
  }

  async function loadDashboard() {
    const tenantId = localStorage.getItem("tenantId");

    if (!tenantId) {
      window.location.href = "onboarding.html";
      return;
    }

    planEl.textContent = "Plan: loading...";
    usageEl.textContent = "Usage: loading...";
    trialStatusEl.textContent = "Trial status: loading...";
    tenantBusinessEl.textContent = "Business: loading...";
    tenantTinEl.textContent = "TIN: loading...";
    tenantEmailEl.textContent = "Email: loading...";
    documentCountEl.textContent = "Total documents: loading...";
    paidCountEl.textContent = "Paid documents: loading...";
    pendingCountEl.textContent = "Pending documents: loading...";
    documentsListEl.innerHTML = "<li>Loading documents...</li>";

    await wakeBackend();

    const [planRes, usageRes, tenantRes, documentsRes] = await Promise.allSettled([
      fetchWithTimeout(() => getPlan(tenantId)),
      fetchWithTimeout(() => getUsage(tenantId)),
      fetchWithTimeout(() => getTenant(tenantId)),
      fetchWithTimeout(() => getDocuments(tenantId))
    ]);

    if (planRes.status === "fulfilled") {
      const planData = planRes.value.data;
      planEl.textContent =
        `Tenant: ${tenantId} | Plan: ${planData.plan} | Subscription status: ${planData.subscriptionStatus} | Monthly limit: ${planData.monthlyPlanLimit} | Price: NGN ${planData.monthlyPlanPriceNgn}`;
      enterpriseMessageEl.textContent = planData.enterpriseMessage || "";
    } else {
      planEl.textContent = `Plan error: ${planRes.reason.message}`;
    }

    let remaining = 0;

    if (usageRes.status === "fulfilled") {
      const usageData = usageRes.value.data;
      remaining = Number(usageData.remaining || 0);

      usageEl.textContent =
        `Usage: ${usageData.used} used | ${usageData.remaining} remaining out of ${usageData.trialFreeSubmissions}`;

      if (remaining <= 0) {
        trialStatusEl.textContent = "Trial status: Expired - please upgrade your plan.";
        upgradeMessageEl.textContent =
          "Upgrade options: Monthly plan NGN 50000 for up to 200 invoices/credit notes, or contact management for Enterprise.";
        subscriptionActionEl.textContent =
          "Next action: Upgrade to Monthly, or contact management if you need Enterprise.";
      } else {
        trialStatusEl.textContent =
          `Trial status: Active - ${usageData.remaining} free submission(s) remaining.`;
        upgradeMessageEl.textContent = "";
        subscriptionActionEl.textContent = "";
      }
    } else {
      usageEl.textContent = `Usage error: ${usageRes.reason.message}`;
      trialStatusEl.textContent = "Could not load trial usage.";
    }

    if (tenantRes.status === "fulfilled" && tenantRes.value.success) {
      tenantBusinessEl.textContent = `Business: ${tenantRes.value.data.business_name}`;
      tenantTinEl.textContent = `TIN: ${tenantRes.value.data.tin}`;
      tenantEmailEl.textContent = `Email: ${tenantRes.value.data.registered_email}`;
    } else if (tenantRes.status === "fulfilled") {
      tenantBusinessEl.textContent = "Business: not found";
      tenantTinEl.textContent = "TIN: not found";
      tenantEmailEl.textContent = "Email: not found";
    } else {
      tenantBusinessEl.textContent = `Business error: ${tenantRes.reason.message}`;
      tenantTinEl.textContent = "TIN: error";
      tenantEmailEl.textContent = "Email: error";
    }

    if (documentsRes.status === "fulfilled" && documentsRes.value.success) {
      const docs = documentsRes.value.data || [];

      if (docs.length > 0) {
        renderDocuments(docs, remaining);
      } else {
        documentCountEl.textContent = "Total documents: 0";
        paidCountEl.textContent = "Paid documents: 0";
        pendingCountEl.textContent = "Pending documents: 0";

        documentsListEl.innerHTML =
          remaining > 0
            ? `<li>No documents submitted yet. Trial is active with ${remaining} free submission(s) remaining. Submit a test invoice or credit note to begin.</li>`
            : `<li>No documents submitted yet. Trial has expired. Upgrade to the monthly plan or contact management for Enterprise.</li>`;
      }
    } else if (documentsRes.status === "rejected") {
      documentCountEl.textContent = "Total documents: error";
      paidCountEl.textContent = "Paid documents: error";
      pendingCountEl.textContent = "Pending documents: error";
      documentsListEl.innerHTML = `<li>Documents error: ${documentsRes.reason.message}</li>`;
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadDashboard();

    statusFilterEl.addEventListener("change", loadDashboard);
    typeFilterEl.addEventListener("change", loadDashboard);

    resetFiltersBtnEl.addEventListener("click", function () {
      statusFilterEl.value = "ALL";
      typeFilterEl.value = "ALL";
      loadDashboard();
    });

    clearTenantBtnEl.addEventListener("click", function () {
      localStorage.removeItem("tenantId");
      window.location.href = "onboarding.html";
    });

    submitDocBtnEl.addEventListener("click", async function () {
      const tenantId = localStorage.getItem("tenantId");

      if (!tenantId) {
        window.location.href = "onboarding.html";
        return;
      }

      try {
        const res = await submitDocument({
          tenantId,
          documentType: "invoice",
          documentNumber: "INV-" + Date.now()
        });

        if (!res.success) {
          submitResultEl.textContent = res.message || "Request failed";
          return;
        }

        submitResultEl.textContent =
          `${res.message} | Doc ID: ${res.data.id} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}${res.data.irn ? ` | IRN: ${res.data.irn}` : ""}`;

        await loadDashboard();
      } catch (err) {
        submitResultEl.textContent = `Error submitting document: ${err.message}`;
      }
    });

    window.markPaid = async function (documentId) {
      const tenantId = localStorage.getItem("tenantId");

      if (!tenantId) {
        window.location.href = "onboarding.html";
        return;
      }

      try {
        const res = await markDocumentPaid({
          tenantId,
          documentId
        });

        if (!res.success) {
          paymentResultEl.textContent =
            res.message || "Failed to mark document as paid";
          return;
        }

        paymentResultEl.textContent =
          `${res.message} | Doc ID: ${res.data.id} | Payment: ${res.data.paymentStatus}`;

        await loadDashboard();
      } catch (err) {
        paymentResultEl.textContent = `Error updating payment status: ${err.message}`;
      }
    };

    submitCreditNoteBtnEl.addEventListener("click", async function () {
      const tenantId = localStorage.getItem("tenantId");

      if (!tenantId) {
        window.location.href = "onboarding.html";
        return;
      }

      try {
        const res = await submitDocument({
          tenantId,
          documentType: "credit_note",
          documentNumber: "CN-" + Date.now()
        });

        if (!res.success) {
          submitResultEl.textContent = res.message || "Request failed";
          return;
        }

        submitResultEl.textContent =
          `${res.message} | Doc ID: ${res.data.id} | Type: ${res.data.documentType} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}${res.data.irn ? ` | IRN: ${res.data.irn}` : ""}`;

        await loadDashboard();
      } catch (err) {
        submitResultEl.textContent = `Error submitting document: ${err.message}`;
      }
    });
  });
</script>
