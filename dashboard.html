<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Tenant Dashboard</h1>

  <p id="plan">Plan: loading...</p>
  <p id="usage">Usage: loading...</p>
  <p id="trialStatus">Trial status: loading...</p>
  <p id="upgradeMessage"></p>
  <p id="subscriptionAction"></p>
  <p id="enterpriseMessage"></p>
  <p id="tenantBusiness">Business: loading...</p>
  <p id="tenantTin">TIN: loading...</p>
  <p id="tenantEmail">Email: loading...</p>
  <h2>Document Log</h2>
  <p id="documentCount">Total documents: loading...</p>
  <p id="paidCount">Paid documents: loading...</p>
  <p id="pendingCount">Pending documents: loading...</p>
  <p>
  <label for="statusFilter">Filter by payment status:</label>
  <select id="statusFilter">
    <option value="ALL">All</option>
    <option value="PAID">PAID</option>
    <option value="PENDING">PENDING</option>
  </select>
</p>
  <p>
  <label for="typeFilter">Filter by document type:</label>
  <select id="typeFilter">
    <option value="ALL">All</option>
    <option value="invoice">invoice</option>
    <option value="credit_note">credit_note</option>
  </select>
</p>
  <p><button id="resetFiltersBtn">Reset Filters</button></p>
  <p><button id="submitDocBtn">Submit Test Invoice</button></p>
  <p><button id="submitCreditNoteBtn">Submit Test Credit Note</button></p>
  <p id="submitResult"></p>
  <p id="paymentResult"></p>
  <ul id="documentsList">
  <li>Loading documents...</li>
  </ul>
  <p><button id="clearTenantBtn">Clear Current Tenant</button></p>
  <p><a href="index.html">Back to Home</a></p>

  <script src="assets/js/api.js"></script>
<script>
  async function loadDashboard() {
    const tenantId = localStorage.getItem("tenantId");

if (!tenantId) {
  window.location.href = "onboarding.html";
  return;
}

    const planRes = await getPlan(tenantId);
    const usageRes = await getUsage(tenantId);
    const tenantRes = await getTenant(tenantId);
    const documentsRes = await getDocuments(tenantId);

    document.getElementById("plan").textContent =
  `Tenant: ${tenantId} | Plan: ${planRes.data.plan} | Subscription status: ${planRes.data.subscriptionStatus} | Monthly limit: ${planRes.data.monthlyPlanLimit} | Price: NGN ${planRes.data.monthlyPlanPriceNgn}`;
document.getElementById("enterpriseMessage").textContent =
  planRes.data.enterpriseMessage || "";
    
    document.getElementById("usage").textContent =
      `Usage: ${usageRes.data.used} used | ${usageRes.data.remaining} remaining out of ${usageRes.data.trialFreeSubmissions}`;
    if (usageRes.data.remaining <= 0) {
  document.getElementById("trialStatus").textContent =
    "Trial status: Expired - please upgrade your plan.";

  document.getElementById("upgradeMessage").textContent =
    "Upgrade options: Monthly plan NGN 50000 for up to 200 invoices/credit notes, or contact management for Enterprise.";

  document.getElementById("subscriptionAction").textContent =
    "Next action: Upgrade to Monthly, or contact management if you need Enterprise.";
} else {
  document.getElementById("trialStatus").textContent =
    `Trial status: Active - ${usageRes.data.remaining} free submission(s) remaining.`;

  document.getElementById("upgradeMessage").textContent = "";
  document.getElementById("subscriptionAction").textContent = "";
}
    if (tenantRes.success) {
  document.getElementById("tenantBusiness").textContent =
    `Business: ${tenantRes.data.business_name}`;
  document.getElementById("tenantTin").textContent =
    `TIN: ${tenantRes.data.tin}`;
  document.getElementById("tenantEmail").textContent =
    `Email: ${tenantRes.data.registered_email}`;
} else {
  document.getElementById("tenantBusiness").textContent = "Business: not found";
  document.getElementById("tenantTin").textContent = "TIN: not found";
  document.getElementById("tenantEmail").textContent = "Email: not found";
}
    const documentsList = document.getElementById("documentsList");
    const statusFilter = document.getElementById("statusFilter");
    const typeFilter = document.getElementById("typeFilter");
    const resetFiltersBtn = document.getElementById("resetFiltersBtn");
    const clearTenantBtn = document.getElementById("clearTenantBtn");
const documentCount = document.getElementById("documentCount");
const paidCount = document.getElementById("paidCount");
const pendingCount = document.getElementById("pendingCount");
if (documentsRes.success && documentsRes.data.length > 0) {
  const paidTotal = documentsRes.data.filter(doc => doc.paymentStatus === "PAID").length;
  const pendingTotal = documentsRes.data.filter(doc => doc.paymentStatus !== "PAID").length;

  documentCount.textContent = `Total documents: ${documentsRes.data.length}`;
  paidCount.textContent = `Paid documents: ${paidTotal}`;
  pendingCount.textContent = `Pending documents: ${pendingTotal}`;

  const selectedStatus = statusFilter.value;
const selectedType = typeFilter.value;

let filteredDocuments = selectedStatus === "ALL"
  ? documentsRes.data
  : documentsRes.data.filter(doc => doc.paymentStatus === selectedStatus);

filteredDocuments = selectedType === "ALL"
  ? filteredDocuments
  : filteredDocuments.filter(doc => doc.documentType === selectedType);

documentsList.innerHTML = filteredDocuments.map(doc =>
  `<li>
    ID: ${doc.id} | Number: ${doc.documentNumber} | Type: ${doc.documentType} |
    Transmission: ${doc.transmissionStatus} | Payment: ${doc.paymentStatus}
    ${doc.paymentStatus !== "PAID"
      ? `<button onclick="markPaid('${doc.id}')">Mark as Paid</button>`
      : ""}
  </li>`
).join("");
} else {
  documentCount.textContent = "Total documents: 0";
  paidCount.textContent = "Paid documents: 0";
  pendingCount.textContent = "Pending documents: 0";
  documentsList.innerHTML =
  usageRes.data.remaining > 0
    ? `<li>No documents submitted yet. Trial is active with ${usageRes.data.remaining} free submission(s) remaining. Submit a test invoice or credit note to begin.</li>`
    : `<li>No documents submitted yet. Trial has expired. Upgrade to the monthly plan or contact management for Enterprise.</li>`;
}
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadDashboard();
  statusFilter.addEventListener("change", loadDashboard);
  typeFilter.addEventListener("change", loadDashboard);
  resetFiltersBtn.addEventListener("click", function () {
  statusFilter.value = "ALL";
  typeFilter.value = "ALL";
  loadDashboard();
});
    clearTenantBtn.addEventListener("click", function () {
  localStorage.removeItem("tenantId");
  window.location.href = "onboarding.html";
});
    document.getElementById("submitDocBtn").addEventListener("click", async function () {
      const tenantId = localStorage.getItem("tenantId");

if (!tenantId) {
  window.location.href = "onboarding.html";
  return;
}

      try {
  const res = await submitDocument({
    tenantId,
    documentType: "invoice",
    documentNumber: "INV-" + Date.now()
  });

  if (!res.success) {
    document.getElementById("submitResult").textContent =
      res.message || "Request failed";
    return;
  }

  document.getElementById("submitResult").textContent =
    `${res.message} | Doc ID: ${res.data.id} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}`;

  await loadDashboard();
} catch (err) {
  document.getElementById("submitResult").textContent =
    "Error submitting document";
}
    window.markPaid = async function (documentId) {
  const tenantId = localStorage.getItem("tenantId");

if (!tenantId) {
  window.location.href = "onboarding.html";
  return;
}

  try {
    const res = await markDocumentPaid({
      tenantId,
      documentId
    });

    if (!res.success) {
      document.getElementById("paymentResult").textContent =
        res.message || "Failed to mark document as paid";
      return;
    }

    document.getElementById("paymentResult").textContent =
      `${res.message} | Doc ID: ${res.data.id} | Payment: ${res.data.paymentStatus}`;

    await loadDashboard();
  } catch (err) {
    document.getElementById("paymentResult").textContent =
      "Error updating payment status";
  }
};
    });
    document.getElementById("submitCreditNoteBtn").addEventListener("click", async function () {
  const tenantId = localStorage.getItem("tenantId");

if (!tenantId) {
  window.location.href = "onboarding.html";
  return;
}

  try {
    const res = await submitDocument({
      tenantId,
      documentType: "credit_note",
      documentNumber: "CN-" + Date.now()
    });

    if (!res.success) {
      document.getElementById("submitResult").textContent =
        res.message || "Request failed";
      return;
    }

    document.getElementById("submitResult").textContent =
      `${res.message} | Doc ID: ${res.data.id} | Type: ${res.data.documentType} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}`;

    await loadDashboard();
  } catch (err) {
    document.getElementById("submitResult").textContent =
      "Error submitting document";
  }
});
  });
</script>
</body>
</html>
