<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Tenant Dashboard</h1>

  <p id="plan">Plan: loading...</p>
  <p id="usage">Usage: loading...</p>
  <p id="trialStatus">Trial status: loading...</p>
  <p id="upgradeMessage"></p>
  <p id="enterpriseMessage"></p>
  <p id="tenantDetails">Tenant details: loading...</p>
  <h2>Document Log</h2>
  <p><button id="submitDocBtn">Submit Test Invoice</button></p>
  <p><button id="submitCreditNoteBtn">Submit Test Credit Note</button></p>
  <p id="submitResult"></p>
  <p id="paymentResult"></p>
  <ul id="documentsList">
  <li>Loading documents...</li>
  </ul>

  <p><a href="index.html">Back to Home</a></p>

  <script src="assets/js/api.js"></script>
<script>
  async function loadDashboard() {
    const tenantId = localStorage.getItem("tenantId") || "123";

    const planRes = await getPlan(tenantId);
    const usageRes = await getUsage(tenantId);
    const tenantRes = await getTenant(tenantId);
    const documentsRes = await getDocuments(tenantId);

    document.getElementById("plan").textContent =
  `Tenant: ${tenantId} | Plan: ${planRes.data.plan} | Subscription status: ${planRes.data.subscriptionStatus} | Monthly limit: ${planRes.data.monthlyPlanLimit} | Price: NGN ${planRes.data.monthlyPlanPriceNgn}`;
document.getElementById("enterpriseMessage").textContent =
  planRes.data.enterpriseMessage || "";
    
    document.getElementById("usage").textContent =
      `Usage: ${usageRes.data.used} used | ${usageRes.data.remaining} remaining out of ${usageRes.data.trialFreeSubmissions}`;
    if (usageRes.data.remaining <= 0) {
  document.getElementById("trialStatus").textContent =
    "Trial status: Expired - please upgrade your plan.";

  document.getElementById("upgradeMessage").textContent =
    "Upgrade options: Monthly plan NGN 50000 for up to 200 invoices/credit notes, or contact management for Enterprise.";
} else {
  document.getElementById("trialStatus").textContent =
    `Trial status: Active - ${usageRes.data.remaining} free submission(s) remaining.`;

  document.getElementById("upgradeMessage").textContent = "";
}

    if (tenantRes.success) {
      document.getElementById("tenantDetails").textContent =
        `Business: ${tenantRes.data.business_name} | TIN: ${tenantRes.data.tin} | Email: ${tenantRes.data.registered_email}`;
    } else {
      document.getElementById("tenantDetails").textContent = "Tenant details not found";
    }
    const documentsList = document.getElementById("documentsList");

if (documentsRes.success && documentsRes.data.length > 0) {
  documentsList.innerHTML = [...documentsRes.data].reverse().map(doc =>
  `<li>
    ${doc.documentNumber} | ${doc.documentType} | ${doc.transmissionStatus} |
    Payment: ${doc.paymentStatus === "PAID" ? "PAID" : "PENDING"}
    ${doc.paymentStatus !== "PAID"
      ? `<button onclick="markPaid('${doc.id}')">Mark as Paid</button>`
      : ""}
  </li>`
).join("");
} else {
  documentsList.innerHTML = "<li>No documents yet.</li>";
}
  }

  document.addEventListener("DOMContentLoaded", function () {
    loadDashboard();

    document.getElementById("submitDocBtn").addEventListener("click", async function () {
      const tenantId = localStorage.getItem("tenantId") || "123";

      try {
  const res = await submitDocument({
    tenantId,
    documentType: "invoice",
    documentNumber: "INV-" + Date.now()
  });

  if (!res.success) {
    document.getElementById("submitResult").textContent =
      res.message || "Request failed";
    return;
  }

  document.getElementById("submitResult").textContent =
    `${res.message} | Doc ID: ${res.data.id} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}`;

  await loadDashboard();
} catch (err) {
  document.getElementById("submitResult").textContent =
    "Error submitting document";
}
    window.markPaid = async function (documentId) {
  const tenantId = localStorage.getItem("tenantId") || "123";

  try {
    const res = await markDocumentPaid({
      tenantId,
      documentId
    });

    if (!res.success) {
      document.getElementById("paymentResult").textContent =
        res.message || "Failed to mark document as paid";
      return;
    }

    document.getElementById("paymentResult").textContent =
      `${res.message} | Doc ID: ${res.data.id} | Payment: ${res.data.paymentStatus}`;

    await loadDashboard();
  } catch (err) {
    document.getElementById("paymentResult").textContent =
      "Error updating payment status";
  }
};
    });
    document.getElementById("submitCreditNoteBtn").addEventListener("click", async function () {
  const tenantId = localStorage.getItem("tenantId") || "123";

  try {
    const res = await submitDocument({
      tenantId,
      documentType: "credit_note",
      documentNumber: "CN-" + Date.now()
    });

    if (!res.success) {
      document.getElementById("submitResult").textContent =
        res.message || "Request failed";
      return;
    }

    document.getElementById("submitResult").textContent =
      `${res.message} | Doc ID: ${res.data.id} | Type: ${res.data.documentType} | Status: ${res.data.transmissionStatus} | Payment: ${res.data.paymentStatus}`;

    await loadDashboard();
  } catch (err) {
    document.getElementById("submitResult").textContent =
      "Error submitting document";
  }
});
  });
</script>
</body>
</html>
