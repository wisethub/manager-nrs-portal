<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Tenant Dashboard</h1>

  <p id="plan">Plan: loading...</p>
  <p id="usage">Usage: loading...</p>
  <p id="trialStatus">Trial status: loading...</p>
  <p id="upgradeMessage"></p>
  <p id="subscriptionAction"></p>
  <p id="enterpriseMessage"></p>
  <p id="tenantBusiness">Business: loading...</p>
  <p id="tenantTin">TIN: loading...</p>
  <p id="tenantEmail">Email: loading...</p>

  <h2>Document Log</h2>
  <p id="documentCount">Total documents: loading...</p>
  <p id="paidCount">Paid documents: loading...</p>
  <p id="pendingCount">Pending documents: loading...</p>

  <p>
    <label for="statusFilter">Filter by payment status:</label>
    <select id="statusFilter">
      <option value="ALL">All</option>
      <option value="PAID">PAID</option>
      <option value="PENDING">PENDING</option>
    </select>
  </p>

  <p>
    <label for="typeFilter">Filter by document type:</label>
    <select id="typeFilter">
      <option value="ALL">All</option>
      <option value="invoice">invoice</option>
      <option value="credit_note">credit_note</option>
    </select>
  </p>

  <p><button id="resetFiltersBtn">Reset Filters</button></p>
  <p><button id="submitDocBtn">Submit Test Invoice</button></p>
  <p><button id="submitCreditNoteBtn">Submit Test Credit Note</button></p>
  <p id="submitResult"></p>
  <p id="paymentResult"></p>

  <ul id="documentsList">
    <li>Loading documents...</li>
  </ul>

  <p><button id="clearTenantBtn">Clear Current Tenant</button></p>
  <p><a href="index.html">Back to Home</a></p>

  <script src="assets/js/api.js?v=99"></script>
  <script>
    function el(id) {
      return document.getElementById(id);
    }

    async function fetchWithTimeout(promiseFactory, timeoutMs) {
      return Promise.race([
        promiseFactory(),
        new Promise(function (_, reject) {
          setTimeout(function () {
            reject(new Error("Request timed out"));
          }, timeoutMs || 60000);
        })
      ]);
    }

    async function wakeBackend() {
      try {
        await fetchWithTimeout(function () {
          return fetch(API_BASE_URL + "/health");
        }, 20000);
      } catch (err) {
      }
    }

    function renderDocuments(documents, remaining) {
      var documentCountEl = el("documentCount");
      var paidCountEl = el("paidCount");
      var pendingCountEl = el("pendingCount");
      var documentsListEl = el("documentsList");
      var statusFilterEl = el("statusFilter");
      var typeFilterEl = el("typeFilter");

      var paidTotal = documents.filter(function (doc) {
        return doc.paymentStatus === "PAID";
      }).length;

      var pendingTotal = documents.filter(function (doc) {
        return doc.paymentStatus !== "PAID";
      }).length;

      documentCountEl.textContent = "Total documents: " + documents.length;
      paidCountEl.textContent = "Paid documents: " + paidTotal;
      pendingCountEl.textContent = "Pending documents: " + pendingTotal;

      var selectedStatus = statusFilterEl.value;
      var selectedType = typeFilterEl.value;

      var filteredDocuments = selectedStatus === "ALL"
        ? documents
        : documents.filter(function (doc) {
            return doc.paymentStatus === selectedStatus;
          });

      filteredDocuments = selectedType === "ALL"
        ? filteredDocuments
        : filteredDocuments.filter(function (doc) {
            return doc.documentType === selectedType;
          });

      if (filteredDocuments.length === 0) {
        documentsListEl.innerHTML = "<li>No documents match the current filters.</li>";
        return;
      }

      documentsListEl.innerHTML = filteredDocuments.map(function (doc) {
        var markPaidButton = doc.paymentStatus !== "PAID"
          ? "<button onclick=\"markPaid('" + doc.id + "')\">Mark as Paid</button>"
          : "";

        var irnText = doc.irn ? " | IRN: " + doc.irn : "";

        var reportText = doc.reportStatus ? " | Report: " + doc.reportStatus : "";

return "<li>" +
  "ID: " + doc.id +
  " | Number: " + doc.documentNumber +
  " | Type: " + doc.documentType +
  " | Transmission: " + doc.transmissionStatus +
  " | Payment: " + doc.paymentStatus +
  irnText +
  reportText +
  " " + markPaidButton +
  "</li>";
      }).join("");
    }

    async function loadDashboard() {
      var tenantId = localStorage.getItem("tenantId");

      if (!tenantId || tenantId === "undefined" || tenantId === "null") {
        window.location.href = "onboarding.html";
        return;
      }

      el("plan").textContent = "Plan: loading...";
      el("usage").textContent = "Usage: loading...";
      el("trialStatus").textContent = "Trial status: loading...";
      el("tenantBusiness").textContent = "Business: loading...";
      el("tenantTin").textContent = "TIN: loading...";
      el("tenantEmail").textContent = "Email: loading...";
      el("documentCount").textContent = "Total documents: loading...";
      el("paidCount").textContent = "Paid documents: loading...";
      el("pendingCount").textContent = "Pending documents: loading...";
      el("documentsList").innerHTML = "<li>Loading documents...</li>";

      await wakeBackend();

      var results = await Promise.allSettled([
        fetchWithTimeout(function () { return getPlan(tenantId); }),
        fetchWithTimeout(function () { return getUsage(tenantId); }),
        fetchWithTimeout(function () { return getTenant(tenantId); }),
        fetchWithTimeout(function () { return getDocuments(tenantId); })
      ]);

      var planRes = results[0];
      var usageRes = results[1];
      var tenantRes = results[2];
      var documentsRes = results[3];

      if (planRes.status === "fulfilled") {
        var planData = planRes.value.data;
        el("plan").textContent =
          "Tenant: " + tenantId +
          " | Plan: " + planData.plan +
          " | Subscription status: " + planData.subscriptionStatus +
          " | Monthly limit: " + planData.monthlyPlanLimit +
          " | Price: NGN " + planData.monthlyPlanPriceNgn;
        el("enterpriseMessage").textContent = planData.enterpriseMessage || "";
      } else {
        el("plan").textContent = "Plan error: " + planRes.reason.message;
      }

      var remaining = 0;

      if (usageRes.status === "fulfilled") {
        var usageData = usageRes.value.data;
        remaining = Number(usageData.remaining || 0);

        el("usage").textContent =
          "Usage: " + usageData.used +
          " used | " + usageData.remaining +
          " remaining out of " + usageData.trialFreeSubmissions;

        if (remaining <= 0) {
          el("trialStatus").textContent = "Trial status: Expired - please upgrade your plan.";
          el("upgradeMessage").textContent =
            "Upgrade options: Monthly plan NGN 50000 for up to 200 invoices/credit notes, or contact management for Enterprise.";
          el("subscriptionAction").textContent =
            "Next action: Upgrade to Monthly, or contact management if you need Enterprise.";
        } else {
          el("trialStatus").textContent =
            "Trial status: Active - " + usageData.remaining + " free submission(s) remaining.";
          el("upgradeMessage").textContent = "";
          el("subscriptionAction").textContent = "";
        }
      } else {
        el("usage").textContent = "Usage error: " + usageRes.reason.message;
        el("trialStatus").textContent = "Could not load trial usage.";
      }

      if (tenantRes.status === "fulfilled" && tenantRes.value.success) {
        el("tenantBusiness").textContent = "Business: " + tenantRes.value.data.business_name;
        el("tenantTin").textContent = "TIN: " + tenantRes.value.data.tin;
        el("tenantEmail").textContent = "Email: " + tenantRes.value.data.registered_email;
      } else if (tenantRes.status === "fulfilled") {
        el("tenantBusiness").textContent = "Business: not found";
        el("tenantTin").textContent = "TIN: not found";
        el("tenantEmail").textContent = "Email: not found";
      } else {
        el("tenantBusiness").textContent = "Business error: " + tenantRes.reason.message;
        el("tenantTin").textContent = "TIN: error";
        el("tenantEmail").textContent = "Email: error";
      }

      if (documentsRes.status === "fulfilled" && documentsRes.value.success) {
        var docs = documentsRes.value.data || [];

        if (docs.length > 0) {
          renderDocuments(docs, remaining);
        } else {
          el("documentCount").textContent = "Total documents: 0";
          el("paidCount").textContent = "Paid documents: 0";
          el("pendingCount").textContent = "Pending documents: 0";

          el("documentsList").innerHTML = remaining > 0
            ? "<li>No documents submitted yet. Trial is active with " + remaining + " free submission(s) remaining. Submit a test invoice or credit note to begin.</li>"
            : "<li>No documents submitted yet. Trial has expired. Upgrade to the monthly plan or contact management for Enterprise.</li>";
        }
      } else if (documentsRes.status === "rejected") {
        el("documentCount").textContent = "Total documents: error";
        el("paidCount").textContent = "Paid documents: error";
        el("pendingCount").textContent = "Pending documents: error";
        el("documentsList").innerHTML = "<li>Documents error: " + documentsRes.reason.message + "</li>";
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      el("statusFilter").addEventListener("change", loadDashboard);
      el("typeFilter").addEventListener("change", loadDashboard);

      el("resetFiltersBtn").addEventListener("click", function () {
        el("statusFilter").value = "ALL";
        el("typeFilter").value = "ALL";
        loadDashboard();
      });

      el("clearTenantBtn").addEventListener("click", function () {
        localStorage.removeItem("tenantId");
        window.location.href = "onboarding.html";
      });

      el("submitDocBtn").addEventListener("click", async function () {
        var tenantId = localStorage.getItem("tenantId");

        if (!tenantId) {
          window.location.href = "onboarding.html";
          return;
        }

        try {
          var res = await submitDocument({
            tenantId: tenantId,
            documentType: "invoice",
            documentNumber: "INV-" + Date.now()
          });

          if (!res.success) {
            el("submitResult").textContent = res.message || "Request failed";
            return;
          }

          el("submitResult").textContent =
            res.message +
            " | Doc ID: " + res.data.id +
            " | Status: " + res.data.transmissionStatus +
            " | Payment: " + res.data.paymentStatus +
            (res.data.irn ? " | IRN: " + res.data.irn : "");

          await loadDashboard();
        } catch (err) {
          el("submitResult").textContent = "Error submitting document: " + err.message;
        }
      });

      window.markPaid = async function (documentId) {
        var tenantId = localStorage.getItem("tenantId");

        if (!tenantId) {
          window.location.href = "onboarding.html";
          return;
        }

        try {
          var res = await markDocumentPaid({
            tenantId: tenantId,
            documentId: documentId
          });

          if (!res.success) {
            el("paymentResult").textContent =
              (res.message || "Failed to mark document as paid") +
              (res.error ? " | Error: " + res.error : "") +
              (res.data ? " | NRS: " + JSON.stringify(res.data) : "");
            return;
          }

          el("paymentResult").textContent =
            res.message +
            " | Doc ID: " + res.data.id +
            " | Payment: " + res.data.paymentStatus +
            (res.data.reportStatus ? " | Report: " + res.data.reportStatus : "");

          await loadDashboard();
        } catch (err) {
          el("paymentResult").textContent = "Error updating payment status: " + err.message;
        }
      };

      el("submitCreditNoteBtn").addEventListener("click", async function () {
        var tenantId = localStorage.getItem("tenantId");

        if (!tenantId) {
          window.location.href = "onboarding.html";
          return;
        }

        try {
          var res = await submitDocument({
            tenantId: tenantId,
            documentType: "credit_note",
            documentNumber: "CN-" + Date.now()
          });

          if (!res.success) {
            el("submitResult").textContent = res.message || "Request failed";
            return;
          }

          el("submitResult").textContent =
            res.message +
            " | Doc ID: " + res.data.id +
            " | Type: " + res.data.documentType +
            " | Status: " + res.data.transmissionStatus +
            " | Payment: " + res.data.paymentStatus +
            (res.data.irn ? " | IRN: " + res.data.irn : "");

          await loadDashboard();
        } catch (err) {
          el("submitResult").textContent = "Error submitting document: " + err.message;
        }
      });

      loadDashboard();
    });
  </script>
</body>
</html>
