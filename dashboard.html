<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Tenant Dashboard</h1>

  <p id="plan">Plan: loading...</p>
  <p id="usage">Usage: loading...</p>

  <h2>Document Log</h2>
  <p>No documents yet.</p>

  <p><a href="index.html">Back to Home</a></p>

  <script src="assets/js/api.js"></script>
  <script>
    async function loadDashboard() {
      const tenantId = "123";

      const planRes = await getPlan(tenantId);
      const usageRes = await getUsage(tenantId);

      document.getElementById("plan").textContent =
        `Plan: ${planRes.data.plan} | Monthly limit: ${planRes.data.monthlyPlanLimit} | Price: NGN ${planRes.data.monthlyPlanPriceNgn}`;

      document.getElementById("usage").textContent =
        `Usage: ${usageRes.data.used} used | ${usageRes.data.remaining} remaining out of ${usageRes.data.trialFreeSubmissions}`;
    }

    loadDashboard();
  </script>
</body>
</html>
